<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="register-container">
        <h1>Register Page</h1>
        <form>
            <label for="exampleFormControlInput4" class="form-label">Name</label> <br>
            <input type="text" class="form-control" id="exampleFormControlInput4" placeholder="Name"> <br> <br>
            <label for="exampleFormControlInput1" class="form-label">Email address</label> <br> 
            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com"> <br> 
            <label for="exampleFormControlInput2" class="form-label">Password</label> <br> 
            <input type="password" class="form-control" id="exampleFormControlInput2" placeholder="Password"> <br> 
            <label for="exampleFormControlInput3" class="form-label">Re-enter Password</label> <br> 
            <input type="password" class="form-control" id="exampleFormControlInput3" placeholder="Re-enter Password"> <br> 
            <button id="reg-button">Register</button>
            <p>Already have an account? <a href="login.html">Click here to login</a></p>
        </form>
    </div>
    <script src="register.js"></script>
</body>
</html>
