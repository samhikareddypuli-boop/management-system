<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar bg-primary">
        <div class="container-fluid d-flex justify-content-center">
            <span class="text-white">Attendance management system</span>
        </div>
    </nav>
    <div class="login-container">
        <h1>Login Page</h1>
        <form id="loginForm">
            <label for="exampleFormControlInput1" class="form-label">Email address</label> <br> 
            <input type="email" class="form-control" id="exampleFormControlInput1" placeholder="name@example.com"> <br> 
            <label for="exampleFormControlInput2" class="form-label">Password</label> <br> 
            <input type="password" class="form-control" id="exampleFormControlInput2" placeholder="Password"> <br> 
            <button id="login-button">Login</button>
            <p>New User? <a href="register.html">Click here to register</a></p>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="login.js"></script>
</body>
</html>
